name: Database Backup

# Backs up the Supabase Postgres database to a downloadable artifact.
#
# Setup (one-time):
#   GitHub → repo → Settings → Secrets and variables → Actions → New repository secret
#     Name:  SUPABASE_DB_URL
#     Value: the Supabase connection string
#
#   IMPORTANT — use the **Session Pooler** connection string, not the direct one.
#   GitHub-hosted runners are IPv4-only, while db.<ref>.supabase.co is IPv6-only.
#   In Supabase: Project → Connect → Session pooler. It looks like:
#     postgresql://postgres.<ref>:<password>@aws-0-<region>.pooler.supabase.com:5432/postgres
#
# Optional repository variable (Settings → Variables → Actions):
#   BACKUP_RETENTION_DAYS  (defaults to 30)

on:
  schedule:
    - cron: '0 2 * * *'      # daily at 02:00 UTC
  workflow_dispatch: {}        # plus a manual "Run workflow" button

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Install PostgreSQL 17 client
        # The Supabase database is Postgres 17, so we need a matching pg_dump.
        run: |
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client-17
          pg_dump --version

      - name: Create backup
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          PGSSLMODE: require
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "::error::SUPABASE_DB_URL secret is not set. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          mkdir -p backups
          STAMP="$(date -u +%Y%m%d-%H%M%S)"
          FILE="backups/washly-${STAMP}.sql.gz"
          echo "Dumping database → ${FILE}"
          pg_dump "$SUPABASE_DB_URL" \
            --no-owner --no-privileges --clean --if-exists \
            | gzip > "$FILE"
          echo "Backup size: $(du -h "$FILE" | cut -f1)"
          echo "BACKUP_FILE=$FILE" >> "$GITHUB_ENV"
          echo "STAMP=$STAMP" >> "$GITHUB_ENV"

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: washly-db-backup-${{ env.STAMP }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: ${{ vars.BACKUP_RETENTION_DAYS || 30 }}
          if-no-files-found: error
